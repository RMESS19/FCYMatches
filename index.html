roupe  4","LOCATION":"Terrain Grassy, Chavannes-le-Chêne - Terrain principal"}];

// Parse and enrich events
const DAYS_FR = ['Dimanche','Lundi','Mardi','Mercredi','Jeudi','Vendredi','Samedi'];
const MONTHS_FR = ['janvier','février','mars','avril','mai','juin','juillet','août','septembre','octobre','novembre','décembre'];

function parseDate(s) {
  const y = +s.slice(0,4), mo = +s.slice(4,6)-1, d = +s.slice(6,8);
  const h = s.length > 8 ? +s.slice(9,11) : 0;
  const m = s.length > 8 ? +s.slice(11,13) : 0;
  return new Date(y, mo, d, h, m);
}

function isTournoi(s) {
  return s.toLowerCase().includes('tournoi') || s.toLowerCase().includes('brack');
}

function getTeamTag(summary) {
  const m = summary.match(/\((Jun\.[A-Z0-9\-\.\/]+( - 2x45)?|[45]e|Sen\.\d+\+)\)/);
  return m ? m[1].replace(' - 2x45','') : 'Autre';
}

function isHomeYvonand(summary) {
  return summary.trim().startsWith('FC Yvonand');
}
function isHomeCheyres(summary) {
  return summary.trim().startsWith('US Cheyres');
}

// Build Yvonand events
const yvonandEvents = RAW_EVENTS.map(e => {
  const dt = parseDate(e.DTSTART);
  const tournoi = isTournoi(e.SUMMARY);
  const home = !tournoi && isHomeYvonand(e.SUMMARY);
  const loc = e.LOCATION.replace(/\\,/g, ',').split(' - ')[0];
  const tag = getTeamTag(e.SUMMARY);
  return { dt, summary: e.SUMMARY, location: loc, description: e.DESCRIPTION, home, tournoi, tag, club: 'yvonand' };
});

// Build Cheyres events
const cheyresEvents = CHEYRES_EVENTS.map(e => {
  const dt = parseDate(e.DTSTART);
  const home = isHomeCheyres(e.SUMMARY);
  const club = e.CLUB;
  return { dt, summary: e.SUMMARY, location: e.LOCATION, description: e.DESCRIPTION, home, tournoi: false, tag: club === 'cheyres-c' ? 'Jun.C' : 'Jun.B', club };
});

const allEvents = [...yvonandEvents, ...cheyresEvents].sort((a,b) => a.dt - b.dt);

// Collect unique team tags per club
const yvonandTags = [...new Set(yvonandEvents.map(e => e.tag))].sort();

let activeTag = 'Tous';
let activeClub = 'yvonand'; // 'yvonand', 'cheyres-c', 'cheyres-b', 'all'

// Week navigation
function getWeekStart(d) {
  const dd = new Date(d);
  const day = dd.getDay();
  const diff = (day === 0) ? -6 : 1 - day;
  dd.setDate(dd.getDate() + diff);
  dd.setHours(0,0,0,0);
  return dd;
}

let currentWeekStart = getWeekStart(new Date());

function formatTime(d) {
  if (d.getHours() === 0 && d.getMinutes() === 0) return '–:––';
  return d.getHours().toString().padStart(2,'0') + ':' + d.getMinutes().toString().padStart(2,'0');
}

function formatDayHeader(d) {
  return DAYS_FR[d.getDay()] + ' ' + d.getDate() + ' ' + MONTHS_FR[d.getMonth()];
}

function changeWeek(delta) {
  currentWeekStart = new Date(currentWeekStart);
  currentWeekStart.setDate(currentWeekStart.getDate() + 7 * delta);
  render();
}

function goToday() {
  currentWeekStart = getWeekStart(new Date());
  render();
}

function setClub(club) {
  activeClub = club;
  activeTag = 'Tous';
  buildFilters();
  render();
}

function buildFilters() {
  // Update club tab styles
  const tabs = document.querySelectorAll('.club-tab');
  tabs.forEach((t, i) => {
    const clubs = ['yvonand','cheyres-c','cheyres-b','all'];
    t.className = 'club-tab';
    if (clubs[i] === activeClub) t.classList.add('active-' + (activeClub === 'all' ? 'yvonand' : activeClub));
  });

  const div = document.getElementById('filters');
  // Only show tag filters for Yvonand
  if (activeClub === 'yvonand') {
    div.style.display = '';
    div.innerHTML = '<span style="font-size:0.78rem;color:#999;align-self:center;">Équipes :</span>';
    ['Tous', ...yvonandTags].forEach(tag => {
      const btn = document.createElement('button');
      btn.className = 'filter-btn' + (tag === activeTag ? ' active' : '');
      btn.textContent = tag;
      btn.onclick = () => { activeTag = tag; render(); };
      div.appendChild(btn);
    });
  } else {
    div.style.display = 'none';
  }
}

function highlightTeam(text, club) {
  if (club === 'yvonand') {
    return text.replace(/(FC Yvonand[^(]*)/g, '<span class="yvonand">$1</span>');
  } else if (club === 'cheyres-c' || club === 'cheyres-b') {
    return text.replace(/(US Cheyres[^(]*)/g, '<span style="color:' + (club==='cheyres-c'?'#1565c0':'#ad1457') + ';font-weight:700">$1</span>');
  }
  return text;
}

function render() {
  const weekEnd = new Date(currentWeekStart);
  weekEnd.setDate(weekEnd.getDate() + 6);
  weekEnd.setHours(23,59,59);

  const label = currentWeekStart.getDate() + ' ' + MONTHS_FR[currentWeekStart.getMonth()] +
    ' – ' + weekEnd.getDate() + ' ' + MONTHS_FR[weekEnd.getMonth()] + ' ' + weekEnd.getFullYear();
  document.getElementById('weekLabel').textContent = label;

  const filtered = allEvents.filter(e => {
    const inWeek = e.dt >= currentWeekStart && e.dt <= weekEnd;
    const clubOk = activeClub === 'all' || e.club === activeClub;
    const tagOk = activeClub !== 'yvonand' || activeTag === 'Tous' || e.tag === activeTag;
    return inWeek && clubOk && tagOk;
  });

  document.querySelectorAll('.filter-btn').forEach(b => {
    b.classList.toggle('active', b.textContent === activeTag);
  });

  const list = document.getElementById('matchList');
  const countBar = document.getElementById('countBar');

  if (filtered.length === 0) {
    countBar.textContent = '0 match cette semaine';
    list.innerHTML = `<div class="empty"><div class="icon">📅</div><p>Aucun match cette semaine.</p></div>`;
    return;
  }

  countBar.textContent = filtered.length + ' match' + (filtered.length > 1 ? 's' : '') + ' cette semaine';

  const byDay = {};
  filtered.forEach(e => {
    const key = e.dt.toDateString();
    if (!byDay[key]) byDay[key] = { date: e.dt, matches: [] };
    byDay[key].matches.push(e);
  });

  list.innerHTML = Object.values(byDay).map(group => {
    const cards = group.matches.map(e => {
      let cls, badge;
      if (e.club === 'cheyres-c') {
        cls = 'cheyres-c';
        badge = `<span class="badge-cheyres-c">🔵 US Cheyres Jun.C ${e.home ? '🏠' : '✈'}</span>`;
      } else if (e.club === 'cheyres-b') {
        cls = 'cheyres-b';
        badge = `<span class="badge-cheyres-b">🔴 US Cheyres Jun.B ${e.home ? '🏠' : '✈'}</span>`;
      } else if (e.tournoi) {
        cls = 'tournoi';
        badge = '<span class="badge-tournoi">Tournoi</span>';
      } else {
        cls = e.home ? 'home' : 'away';
        badge = e.home ? '<span class="badge-home">🏠 Domicile</span>' : '<span class="badge-away">✈ Extérieur</span>';
      }
      const comp = e.description.replace(/\\n.*/,'').trim();
      return `<div class="match-card ${cls}">
        <div class="card-top">
          <div class="time-badge">${formatTime(e.dt)}</div>
          <div class="match-info">
            <div class="teams">${highlightTeam(e.summary, e.club)}</div>
            <div class="competition">${comp}</div>
            ${badge}
          </div>
        </div>
        <div class="card-bottom">
          <span style="font-size:0.8rem">📍</span>
          <div class="location">${e.location}</div>
        </div>
      </div>`;
    }).join('');
    return `<div class="day-group">
      <div class="day-header">${formatDayHeader(group.date)}</div>
      ${cards}
    </div>`;
  }).join('');
}

buildFilters();
render();</script>
</body>
</html>
